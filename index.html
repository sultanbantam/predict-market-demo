<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Prediction Market L2 (Polymarket Clone)</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #08090b; color: white; font-family: Inter, sans-serif;">
        <div style="text-align: center;">
          <h2 style="margin-bottom: 10px;">PredictL2</h2>
          <p style="color: #888;">PredictL2 - LOADING V3...</p>
        </div>
      </div>
    </div>
    <div id="debug-error" style="position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,0,0,0.9); color: white; padding: 20px; display: none; z-index: 9999; font-family: monospace; font-size: 12px; white-space: pre-wrap;"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var debug = document.getElementById('debug-error');
        debug.style.display = 'block';
        debug.innerHTML = 'ERROR: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo;
        return false;
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
